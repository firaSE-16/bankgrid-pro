version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: bankgrid-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bank_grid
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --max-allowed-packet=256M --innodb-buffer-pool-size=512M

volumes:
  mysql_data:
