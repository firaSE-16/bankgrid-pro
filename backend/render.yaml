services:
  - type: web
    name: bankgrid-api
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bankgrid-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: bankgrid-db
    plan: free
    databaseName: bank_grid
